name: Build Android Artifacts

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    env:
      NB_UPLOAD_STORE_B64: ${{ secrets.NB_UPLOAD_STORE_B64 }}
      NB_UPLOAD_STORE_PASSWORD: ${{ secrets.NB_UPLOAD_STORE_PASSWORD }}
      NB_UPLOAD_KEY_ALIAS: ${{ secrets.NB_UPLOAD_KEY_ALIAS }}
      NB_UPLOAD_KEY_PASSWORD: ${{ secrets.NB_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Decode upload keystore
        if: ${{ env.NB_UPLOAD_STORE_B64 != '' }}
        run: |
          echo "$NB_UPLOAD_STORE_B64" | base64 --decode > "$RUNNER_TEMP/notifybridge-upload.jks"

      - name: Export signing environment
        if: ${{ env.NB_UPLOAD_STORE_B64 != '' }}
        run: |
          echo "NB_UPLOAD_STORE_FILE=$RUNNER_TEMP/notifybridge-upload.jks" >> "$GITHUB_ENV"
          echo "NB_UPLOAD_STORE_PASSWORD=$NB_UPLOAD_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "NB_UPLOAD_KEY_ALIAS=$NB_UPLOAD_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "NB_UPLOAD_KEY_PASSWORD=$NB_UPLOAD_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Debug APK and Release Bundle
        run: ./gradlew :app:assembleDebug :app:bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: notifybridge-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: notifybridge-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
